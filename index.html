<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Produtos</title>
    <style>
        #video-container { width: 100%; max-width: 400px; position: relative; }
        video { width: 100%; border-radius: 8px; background: #000; }
        .resultado { margin-top: 20px; font-family: sans-serif; }
        input { padding: 10px; width: 100%; box-sizing: border-box; font-size: 1.2rem; }
        #img_result{width: 100%;}
        #btn_pesquisar{width: 100%; height: 40px;}
    </style>
</head>
<body>

    <div id="video-container">
        <video id="camera" autoplay playsinline></video>
    </div>

    <div class="resultado">
        <label>Código Detectado:</label>
        <input type="text" id="resultado-input" placeholder="Aguardando leitura...">
        <p id="status"></p>
    </div>


    <!-- <input type="text" id="idItem" placeholder="Digite o ID do item"> -->
    <button onclick="consultarItem()" id="btn_pesquisar">Pesquisar</button>

    <div id="resultado"></div>
    <img id="img_result" src="" alt="">

    <script>
        const video = document.getElementById('camera');
        const inputResultado = document.getElementById('resultado-input');
        const status = document.getElementById('status');

        // 1. Verificar se o navegador suporta a API
        if (!('BarcodeDetector' in window)) {
            status.innerText = "Barcode Detector não suportado neste navegador.";
        } else {
            iniciarCamera();
        }

        async function iniciarCamera() {
            try {
                // Solicita acesso à câmera traseira
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } } 
                });
                video.srcObject = stream;
                
                // Inicia a detecção após o vídeo carregar
                video.addEventListener('loadeddata', detectarCodigos);
            } catch (err) {
                console.error("Erro ao acessar câmera:", err);
                status.innerText = "Erro ao acessar a câmera traseira.";
            }
        }

        async function detectarCodigos() {
            // Instancia o detector (pode-se especificar os formatos como 'ean_13', 'qr_code', etc)
            const barcodeDetector = new BarcodeDetector();

            async function render() {
                try {
                    // Tenta detectar códigos no frame atual do vídeo
                    const barcodes = await barcodeDetector.detect(video);
                    
                    if (barcodes.length > 0) {
                        const valorLido = barcodes[0].rawValue;
                        
                        // Insere o valor no input
                        inputResultado.value = valorLido;
                        //Buscar produto aqui
                        // consultarItem()

                        // Feedback visual opcional: piscar o input ou vibrar o celular
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                } catch (e) {
                    // Erros silenciosos durante a renderização
                }
                // Continua o loop de detecção
                requestAnimationFrame(render);
            }
            
            render();
        }
        
        async function consultarItem() {
            const id = document.getElementById('resultado-input').value;
            const img_result = document.getElementById('img_result')
            const resultado = document.getElementById('resultado');
                
            resultado.innerHTML = "Procurando..."

            const url =
            `https://script.google.com/macros/s/AKfycbzfE5WMUduzkve1dnkYvb3VeeDW5GotJIlQCkjGxiYI1OzxCvGWgVUhx6DEKn8W-wpMTQ/exec?id=${encodeURIComponent(id)}`;

            try {
                const response = await fetch(url);
                const dados = await response.json();
                resultado.innerHTML = `Encontrado: ${dados.quantidade}`
                img_result.src = dados.foto
                console.log(dados);

            } catch (err) {
                resultado.innerHTML = "não encontrado"
                console.error(err);
            }
        }
    </script>
</body>
</html>
